[profile.default]
src = "src"
out = "out"
libs = ["lib"]

remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]


optimizer = true
optimizer_runs = 1000


evm_version = "cancun" 


[rpc_endpoints]
amoy = "${AMOY_RPC_URL}"


[etherscan]
polygon_amoy = { key = "${POLYGONSCAN_API_KEY}", url = "https://api-amoy.polygonscan.com/api" }


[fmt]
bracket_spacing = true
int_types = "long"
line_length = 100
quote_style = "double"
tab_width = 4


[invariant]
runs = 256
depth = 15